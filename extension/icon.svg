<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22232a"/>
      <stop offset="100%" stop-color="#13141a"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF8A6E"/>
      <stop offset="100%" stop-color="#FF694A"/>
    </linearGradient>
  </defs>

  <!-- Squircle background -->
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#bg)"/>
  <rect x="0" y="0" width="128" height="128" rx="28" ry="28" fill="url(#sheen)"/>

  <!-- LEFT table card. Card top y=22, height=84. Header is 14px tall. First
       column row centers at internal y=24 → absolute y=46. -->
  <g transform="translate(10, 22)">
    <rect x="0" y="0" width="36" height="84" rx="6" ry="6"
          fill="#2a2b33" stroke="#FF694A" stroke-width="1.5"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 24 a 6 6 0 0 1 6 6 v 8 h -36 z"
          fill="url(#header)"/>
    <line x1="0" y1="14" x2="36" y2="14" stroke="#FF694A" stroke-width="0.8" opacity="0.5"/>
    <!-- Column rows. First row is the FK source (highlighted). -->
    <circle cx="6" cy="24" r="2.2" fill="#FF694A"/>
    <rect x="11" y="22.5" width="20" height="3" rx="1" fill="#e6e7ee"/>
    <circle cx="6" cy="36" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="34.5" width="16" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="48" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="46.5" width="18" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="60" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="58.5" width="14" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="72" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="70.5" width="16" height="3" rx="1" fill="#9a9ba5"/>
  </g>

  <!-- FK edge: from right edge of left card (x=46, y=46) to left edge of
       right card (x=82, y=46). Drawn AFTER cards so it sits on top of the
       card border for a clean overlap. -->
  <path d="M 46 46 C 56 46, 72 46, 82 46"
        stroke="#FF694A" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Crow's foot at the right (the "many" side) -->
  <path d="M 76 41 L 84 46 L 76 51"
        stroke="#FF694A" stroke-width="2.2" fill="none"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Single tick at the left (the "one" side) -->
  <line x1="48" y1="41" x2="48" y2="51"
        stroke="#FF694A" stroke-width="2.2" stroke-linecap="round"/>

  <!-- RIGHT table card -->
  <g transform="translate(82, 22)">
    <rect x="0" y="0" width="36" height="84" rx="6" ry="6"
          fill="#2a2b33" stroke="#FF694A" stroke-width="1.5"/>
    <path d="M 0 6 a 6 6 0 0 1 6 -6 h 24 a 6 6 0 0 1 6 6 v 8 h -36 z"
          fill="url(#header)"/>
    <line x1="0" y1="14" x2="36" y2="14" stroke="#FF694A" stroke-width="0.8" opacity="0.5"/>
    <!-- First row is the PK target (highlighted). -->
    <circle cx="6" cy="24" r="2.2" fill="#FF694A"/>
    <rect x="11" y="22.5" width="20" height="3" rx="1" fill="#e6e7ee"/>
    <circle cx="6" cy="36" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="34.5" width="16" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="48" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="46.5" width="18" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="60" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="58.5" width="14" height="3" rx="1" fill="#9a9ba5"/>
    <circle cx="6" cy="72" r="2.2" fill="#5a5b66"/>
    <rect x="11" y="70.5" width="16" height="3" rx="1" fill="#9a9ba5"/>
  </g>
</svg>
